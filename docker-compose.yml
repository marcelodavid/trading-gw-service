version: '3.8'

services:
  trading-gateway:
    build:
      context: .
      target: development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - TRADING_GATEWAY_FXCM_USER_ID=demo
      - TRADING_GATEWAY_FXCM_PASSWORD=demo
      - TRADING_GATEWAY_FXCM_URL=http://www.fxcorporate.com/Hosts.jsp
      - TRADING_GATEWAY_FXCM_CONNECTION=Demo
    command: uvicorn app.entrypoints.fastapi.main:app --host 0.0.0.0 --port 8000 --reload
